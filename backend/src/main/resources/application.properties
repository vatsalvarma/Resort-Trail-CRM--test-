# ── Server ────────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/api

# ── Database ──────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/village_trails_crm}
spring.datasource.username=${DB_USERNAME:crm_user}
spring.datasource.password=${DB_PASSWORD:crm_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Security / JWT ────────────────────────────────────────────
jwt.secret=${JWT_SECRET:VillageTrailsCRMSuperSecretKey2024!@#$%VeryLong}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# ── CORS ──────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# ── Logging ───────────────────────────────────────────────────
logging.level.com.villagetrails=DEBUG
logging.level.org.springframework.security=WARN
